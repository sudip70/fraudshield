name: Wake Render API

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:

jobs:
  ping-healthcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Ping Render health endpoint
        env:
          RENDER_HEALTHCHECK_URL: ${{ vars.RENDER_HEALTHCHECK_URL }}
        run: bash scripts/wake_render.sh
